{% extends "base.html" %}
{% block page_title %}Create Assignment{% endblock %}
{% block content %}
<div style="padding:24px;max-width:800px;margin:0 auto">
  <h1 style="color:#1a5c38;margin-bottom:24px">Create New Assignment</h1>

  {% if messages %}{% for m in messages %}<div style="background:#fef2f2;color:#b91c1c;padding:10px 14px;border-radius:8px;margin-bottom:16px">{{ m }}</div>{% endfor %}{% endif %}

  <form method="post" style="background:white;padding:24px;border-radius:12px;border:1px solid #e5e7eb">
    {% csrf_token %}
    
    <div style="margin-bottom:16px">
      <label style="display:block;font-weight:600;margin-bottom:6px;font-size:13px;color:#374151">Course</label>
      <select name="course" required style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px">
        <option value="">Select course...</option>
        {% for c in courses %}<option value="{{ c.id }}">{{ c.code }} - {{ c.title }}</option>{% endfor %}
      </select>
    </div>

    <div style="margin-bottom:16px">
      <label style="display:block;font-weight:600;margin-bottom:6px;font-size:13px;color:#374151">Semester</label>
      <select name="semester" required style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px">
        {% for s in semesters %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
      </select>
    </div>

    <div style="margin-bottom:16px">
      <label style="display:block;font-weight:600;margin-bottom:6px;font-size:13px;color:#374151">Title</label>
      <input type="text" name="title" required placeholder="e.g. Research on Public Policy" style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px">
    </div>

    <div style="margin-bottom:16px">
      <label style="display:block;font-weight:600;margin-bottom:6px;font-size:13px;color:#374151">Instructions (for both individual & group parts)</label>
      <textarea name="description" required rows="6" placeholder="Describe what students need to do..." style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;font-family:inherit"></textarea>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div>
        <label style="display:block;font-weight:600;margin-bottom:6px;font-size:13px;color:#374151">Individual Deadline (10 marks)</label>
        <input type="datetime-local" name="individual_deadline" required style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px">
      </div>
      <div>
        <label style="display:block;font-weight:600;margin-bottom:6px;font-size:13px;color:#374151">Group Deadline (10 marks)</label>
        <input type="datetime-local" name="group_deadline" required style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px">
      </div>
    </div>

    <div style="margin-bottom:24px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" name="is_published">
        <span style="font-size:14px">Publish immediately (students can see and submit)</span>
      </label>
    </div>

    <div style="display:flex;gap:12px">
      <button type="submit" style="background:#1a5c38;color:white;padding:12px 28px;border:none;border-radius:8px;font-weight:600;cursor:pointer">Create Assignment</button>
      <a href="{% url 'lecturers:assignment_list' %}" style="padding:12px 28px;border:1px solid #d1d5db;border-radius:8px;text-decoration:none;color:#374151">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
